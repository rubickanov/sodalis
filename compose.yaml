services:
  postgres:
    image: postgres:17-alpine
    container_name: sodalis-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: "sodalis"
      POSTGRES_PASSWORD: "sodalis"
      POSTGRES_DB: "sodalis"
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U sodalis -d sodalis" ]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 30s


volumes:
  postgres-data:
